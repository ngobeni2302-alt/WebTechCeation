<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Preview | WEBHub</title>
    <meta name="description" content="Preview selected WEBHub website and graphic design offers.">
    <link rel="icon" href="assets/images/website_qr.png" type="image/png">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.0/css/all.min.css">
</head>
<body class="offer-page">
    <header class="offer-header">
        <nav aria-label="Main Navigation">
            <a href="index.html" class="logo">WEBHub</a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">Offers</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li>
                    <label for="themeNav" class="theme" aria-label="Toggle dark and light theme">
                        <span class="theme__toggle-wrap">
                            <input id="themeNav" class="theme__toggle theme-toggle-btn" type="checkbox" role="switch" name="theme" checked>
                            <span class="theme__icon">
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                                <span class="theme__icon-part"></span>
                            </span>
                        </span>
                    </label>
                </li>
            </ul>
            <div class="menu-toggle" id="menuToggle" aria-label="Open mobile menu" role="button" aria-expanded="false" tabindex="0">☰</div>
        </nav>

        <div class="side-panel" id="sidePanel" aria-hidden="true">
            <div style="margin-top: 1rem; margin-bottom: 2rem;">
                <label for="themeSide" class="theme" aria-label="Toggle dark and light theme">
                    <span class="theme__toggle-wrap">
                        <input id="themeSide" class="theme__toggle theme-toggle-btn" type="checkbox" role="switch" name="theme" checked>
                        <span class="theme__icon">
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                            <span class="theme__icon-part"></span>
                        </span>
                    </span>
                </label>
            </div>
            <a href="index.html#home">Home</a>
            <a href="index.html#about">Offers</a>
            <a href="index.html#features">Features</a>
            <a href="index.html#contact">Contact</a>
        </div>
        <div class="overlay" id="overlay"></div>
    </header>

    <main class="offer-detail">
        <a href="index.html#about" class="back-link"><i class="fas fa-arrow-left"></i> Back to offers</a>
        <section class="offer-detail-intro">
            <p class="offer-label" id="offerLabel">Selected Folder</p>
            <h1 id="offerTitle">Offer Preview</h1>
            <p id="offerDescription"></p>
        </section>
        <section class="offer-detail-gallery" id="offerGallery" aria-live="polite"></section>
    </main>

    <div id="imageModal" class="image-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Image Preview">
        <span class="close-modal" id="closeModal" aria-label="Close image modal" role="button" tabindex="0">&times;</span>
        <img class="image-modal-content" id="modalImage" alt="Expanded image preview">
    </div>

    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/offers.js"></script>
</body>
</html>
